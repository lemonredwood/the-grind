<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Grind — LeetCode Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f6f7f9; --surface: #ffffff; --surface-2: #fbfbfc; --line: #e6e8ec;
    --line-strong: #d3d7de; --ink: #171a21; --muted: #656b78; --faint: #9aa2b1;
    --p1: #4f46e5; --p1-soft: #eef0fe;
    --easy: #0d9488; --medium: #d97706; --hard: #e11d48;
    --easy-soft: #e5f4f2; --medium-soft: #fbf0e0; --hard-soft: #fce8ee;
    --ok: #0d9488; --ok-soft: #e5f4f2; --warn: #d97706; --warn-soft: #fbf0e0;
    --radius: 14px; --radius-sm: 9px;
    --shadow: 0 1px 2px rgba(20,26,40,.05), 0 8px 24px -12px rgba(20,26,40,.14);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, "Cascadia Code", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --surface: #171a21; --surface-2: #1b1f27; --line: #262a33;
      --line-strong: #333846; --ink: #eef0f4; --muted: #9aa2b1; --faint: #6b7280;
      --p1: #818cf8; --p1-soft: #21243a;
      --easy: #2dd4bf; --medium: #f59e0b; --hard: #fb7185;
      --easy-soft: #0f2b28; --medium-soft: #2c2110; --hard-soft: #2e1620;
      --ok: #2dd4bf; --ok-soft: #0f2b28; --warn: #f59e0b; --warn-soft: #2c2110;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px -14px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="light"] {
    --bg:#f6f7f9;--surface:#fff;--surface-2:#fbfbfc;--line:#e6e8ec;--line-strong:#d3d7de;
    --ink:#171a21;--muted:#656b78;--faint:#9aa2b1;--p1:#4f46e5;--p1-soft:#eef0fe;
    --easy:#0d9488;--medium:#d97706;--hard:#e11d48;--easy-soft:#e5f4f2;--medium-soft:#fbf0e0;--hard-soft:#fce8ee;
    --ok:#0d9488;--ok-soft:#e5f4f2;--warn:#d97706;--warn-soft:#fbf0e0;
    --shadow:0 1px 2px rgba(20,26,40,.05),0 8px 24px -12px rgba(20,26,40,.14);
  }
  :root[data-theme="dark"] {
    --bg:#0f1115;--surface:#171a21;--surface-2:#1b1f27;--line:#262a33;--line-strong:#333846;
    --ink:#eef0f4;--muted:#9aa2b1;--faint:#6b7280;--p1:#818cf8;--p1-soft:#21243a;
    --easy:#2dd4bf;--medium:#f59e0b;--hard:#fb7185;--easy-soft:#0f2b28;--medium-soft:#2c2110;--hard-soft:#2e1620;
    --ok:#2dd4bf;--ok-soft:#0f2b28;--warn:#f59e0b;--warn-soft:#2c2110;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -14px rgba(0,0,0,.6);
  }

  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased; }
  [hidden] { display:none !important; }
  .wrap { max-width:1000px; margin:0 auto; padding:28px 20px 80px; }

  header.top { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
  .brand h1 { margin:0; font-size:1.6rem; letter-spacing:-.02em; font-weight:680; text-wrap:balance; }
  .brand .sub { margin:2px 0 0; color:var(--muted); font-size:.86rem; font-family:var(--mono); }
  .brand .sub b { color:var(--ink); font-weight:600; }
  .actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  button, .btn { font-family:var(--sans); font-size:.82rem; font-weight:550; color:var(--ink);
    background:var(--surface); border:1px solid var(--line-strong); padding:8px 12px; border-radius:var(--radius-sm);
    cursor:pointer; display:inline-flex; align-items:center; gap:6px; line-height:1; transition:background .12s,border-color .12s,transform .04s; }
  button:hover, .btn:hover { background:var(--surface-2); border-color:var(--faint); }
  button:active { transform:translateY(1px); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.primary { background:var(--p1); border-color:var(--p1); color:#fff; }
  button.primary:hover { filter:brightness(1.06); background:var(--p1); }
  button.primary:disabled { filter:none; }
  button.ghost-danger { color:var(--hard); border-color:transparent; background:transparent; }
  button.ghost-danger:hover { background:var(--hard-soft); }
  #adminBtn.adminon { color:var(--ok); border-color:var(--ok); }
  .mewho { font-family:var(--sans); font-size:.8rem; font-weight:550; color:var(--ink); background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:8px 9px; max-width:150px; }
  .mewho:focus { outline:none; border-color:var(--p1); box-shadow:0 0 0 3px var(--p1-soft); }
  .nameinput[readonly], .lcinput[readonly] { cursor:default; }
  .nameinput[readonly]:hover, .lcinput[readonly]:hover { border-bottom-color:transparent; }
  :focus-visible { outline:2px solid var(--p1); outline-offset:2px; }

  .roomchip { font-family:var(--mono); font-size:.78rem; letter-spacing:.02em; }
  .roomchip .rdot { width:7px; height:7px; border-radius:50%; background:var(--faint); flex:none; box-shadow:0 0 0 3px transparent; transition:background .2s,box-shadow .2s; }
  .roomchip.live .rdot { background:var(--ok); box-shadow:0 0 0 3px var(--ok-soft); }
  .roomchip.warn .rdot { background:var(--warn); box-shadow:0 0 0 3px var(--warn-soft); }
  .roomchip.off .rdot  { background:var(--hard); box-shadow:0 0 0 3px var(--hard-soft); }
  .roomchip b { color:var(--ink); font-weight:600; }

  /* leaderboard */
  .board { display:grid; grid-template-columns:repeat(auto-fill, minmax(216px,1fr)); gap:14px; margin-bottom:14px; }
  .pcard { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 16px 14px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
  .pcard::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background:var(--pc,var(--p1)); }
  .pcard.leading { box-shadow:var(--shadow),0 0 0 1.5px var(--pc); }
  .pname { display:flex; align-items:center; gap:7px; margin-bottom:13px; padding-right:18px; }
  .rk { font-family:var(--mono); font-size:.72rem; color:var(--faint); font-weight:600; min-width:1.1ch; text-align:right; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--pc); flex:none; }
  .nameinput { font-family:var(--sans); font-weight:640; font-size:.98rem; color:var(--ink); background:transparent;
    border:none; border-bottom:1px dashed transparent; padding:2px 0; width:100%; min-width:0; letter-spacing:-.01em; }
  .nameinput:hover { border-bottom-color:var(--line-strong); }
  .nameinput:focus { outline:none; border-bottom-color:var(--pc); }
  .crown { font-size:.9rem; flex:none; }
  .removep { position:absolute; top:9px; right:9px; border:none; background:transparent; color:var(--faint); cursor:pointer; font-size:.8rem; padding:3px 5px; border-radius:6px; opacity:0; transition:opacity .12s,background .12s,color .12s; }
  .pcard:hover .removep, .removep:focus-visible { opacity:1; }
  .removep:hover { color:var(--hard); background:var(--hard-soft); }
  .statrow { display:flex; gap:16px; margin-bottom:14px; }
  .stat .k { font-family:var(--mono); font-size:1.55rem; font-weight:600; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums; color:var(--ink); }
  .stat .k .u { font-size:.66rem; color:var(--muted); font-weight:500; margin-left:2px; }
  .stat .l { text-transform:uppercase; letter-spacing:.06em; font-size:.6rem; color:var(--muted); margin-top:6px; font-weight:600; }
  .stat .k.streak.hot { color:var(--pc); }
  .breakdown { margin-top:2px; }
  .bar { height:7px; border-radius:6px; background:var(--line); overflow:hidden; display:flex; }
  .bar i { display:block; height:100%; }
  .bar i.e { background:var(--easy); } .bar i.m { background:var(--medium); } .bar i.h { background:var(--hard); }
  .blabels { display:flex; gap:12px; margin-top:8px; font-family:var(--mono); font-size:.7rem; color:var(--muted); font-variant-numeric:tabular-nums; }
  .blabels span b { color:var(--ink); font-weight:600; }
  .blabels .sw { display:inline-block; width:7px; height:7px; border-radius:2px; margin-right:4px; }
  .emptyboard { grid-column:1/-1; padding:30px 20px; text-align:center; color:var(--muted); border:1px dashed var(--line-strong); border-radius:var(--radius); background:var(--surface); font-size:.9rem; }
  .emptyboard b { color:var(--ink); }

  .lcrow { display:flex; align-items:center; gap:6px; margin-top:11px; padding-top:10px; border-top:1px dashed var(--line); }
  .lcinput { flex:1; min-width:0; font-family:var(--mono); font-size:.72rem; color:var(--muted); background:transparent; border:none; border-bottom:1px dashed transparent; padding:2px 0; }
  .lcinput::placeholder { color:var(--faint); }
  .lcinput:hover { border-bottom-color:var(--line-strong); }
  .lcinput:focus { outline:none; color:var(--ink); border-bottom-color:var(--pc); }
  .lcstat { flex:none; font-family:var(--mono); font-size:.62rem; font-weight:600; letter-spacing:.02em; white-space:nowrap; }
  .lcstat.ok { color:var(--pc); }
  .lcstat.pend { color:var(--faint); }

  /* add person */
  .addperson { margin:0 0 22px; }
  .addperson form { display:flex; gap:8px; }
  .addperson input { flex:1; min-width:0; font-family:var(--sans); font-size:.85rem; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:9px 11px; color:var(--ink); }
  .addperson input::placeholder { color:var(--faint); }
  .addperson input:focus { outline:none; border-color:var(--p1); box-shadow:0 0 0 3px var(--p1-soft); }

  /* log */
  section.log { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .log-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .log-head h2 { margin:0; font-size:.95rem; font-weight:640; letter-spacing:-.01em; }
  .log-head h2 span { color:var(--faint); font-family:var(--mono); font-weight:500; margin-left:6px; font-size:.85rem; }
  .seg { display:flex; flex-wrap:wrap; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:2px; gap:2px; max-width:100%; }
  .seg button { border:none; background:transparent; padding:5px 10px; font-size:.78rem; border-radius:6px; color:var(--muted); font-weight:550; display:inline-flex; align-items:center; }
  .seg button:hover { background:transparent; color:var(--ink); }
  .seg button.on { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .seg .pdot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
  .addrow { display:grid; grid-template-columns:1fr 92px 1fr 104px 150px auto; gap:8px; padding:12px 16px; border-bottom:1px solid var(--line); align-items:center; background:var(--surface-2); }
  .addrow input, .addrow select { font-family:var(--sans); font-size:.82rem; color:var(--ink); background:var(--surface); border:1px solid var(--line-strong); border-radius:8px; padding:8px 9px; width:100%; min-width:0; }
  .addrow input::placeholder { color:var(--faint); }
  .addrow input:focus, .addrow select:focus { outline:none; border-color:var(--p1); box-shadow:0 0 0 3px var(--p1-soft); }
  .tbl-scroll { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:580px; }
  thead th { text-align:left; font-size:.64rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); font-weight:600; padding:10px 16px; border-bottom:1px solid var(--line); background:var(--surface); }
  tbody td { padding:11px 16px; border-bottom:1px solid var(--line); font-size:.87rem; vertical-align:middle; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:var(--surface-2); }
  .who { display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:.8rem; }
  .who .d { width:8px; height:8px; border-radius:50%; flex:none; }
  .ptitle { font-weight:550; }
  .ptopic { color:var(--muted); font-size:.78rem; font-family:var(--mono); }
  .pill { font-family:var(--mono); font-size:.68rem; font-weight:600; letter-spacing:.03em; padding:3px 8px; border-radius:999px; text-transform:uppercase; }
  .pill.e { color:var(--easy); background:var(--easy-soft); } .pill.m { color:var(--medium); background:var(--medium-soft); } .pill.h { color:var(--hard); background:var(--hard-soft); }
  td.date { font-family:var(--mono); font-size:.78rem; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
  td.pts { font-family:var(--mono); text-align:right; font-variant-numeric:tabular-nums; color:var(--muted); }
  .del { border:none; background:transparent; color:var(--faint); cursor:pointer; padding:4px 6px; border-radius:6px; font-size:.95rem; line-height:1; }
  .del:hover { color:var(--hard); background:var(--hard-soft); }
  .edit { border:none; background:transparent; color:var(--faint); cursor:pointer; padding:4px 6px; border-radius:6px; font-size:.9rem; line-height:1; margin-right:1px; }
  .edit:hover { color:var(--p1); background:var(--p1-soft); }
  td.editcell { padding:0; }
  .editrow { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .editrow .full { flex:1 1 100%; }
  .editrow .e-num { flex:0 0 74px; }
  .editrow .e-topic { flex:2 1 150px; }
  .editrow .e-diff { flex:0 0 104px; }
  .editrow .e-who { flex:0 0 132px; }
  .editrow .e-date { flex:0 0 162px; color-scheme:light dark; }
  .editrow .ebtns { flex:1 1 auto; display:flex; gap:8px; justify-content:flex-end; }
  .empty { padding:46px 20px; text-align:center; color:var(--muted); }
  .empty .big { font-size:1.6rem; margin-bottom:8px; }
  .empty p { margin:4px 0; font-size:.88rem; }

  .foot { margin-top:18px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; color:var(--faint); font-size:.74rem; font-family:var(--mono); }
  .rules b { color:var(--muted); font-weight:600; }
  #syncStatus { display:inline-flex; align-items:center; gap:7px; }
  #syncStatus .sdot { width:7px; height:7px; border-radius:50%; background:var(--faint); flex:none; box-shadow:0 0 0 3px transparent; }
  #syncStatus.live .sdot { background:var(--ok); box-shadow:0 0 0 3px var(--ok-soft); }
  #syncStatus.warn { color:var(--warn); } #syncStatus.warn .sdot { background:var(--warn); box-shadow:0 0 0 3px var(--warn-soft); }
  #syncStatus.off { color:var(--hard); } #syncStatus.off .sdot { background:var(--hard); box-shadow:0 0 0 3px var(--hard-soft); }

  /* gate */
  .gate { min-height:100vh; display:grid; place-items:center; padding:24px; }
  .gatecard { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px 26px; }
  .gatecard h1 { margin:0 0 2px; font-size:1.5rem; letter-spacing:-.02em; }
  .gatecard .lead { margin:0 0 20px; color:var(--muted); font-size:.9rem; }
  .field { display:block; margin-bottom:14px; }
  .field label { display:block; font-size:.7rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); font-weight:600; margin-bottom:6px; }
  .field input { width:100%; font-family:var(--mono); font-size:1rem; letter-spacing:.02em; color:var(--ink); background:var(--bg); border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:11px 12px; }
  .field input:focus { outline:none; border-color:var(--p1); box-shadow:0 0 0 3px var(--p1-soft); }
  .gatecard .go { width:100%; justify-content:center; padding:12px; font-size:.9rem; margin-top:4px; }
  .hint { margin:16px 0 0; font-size:.78rem; color:var(--faint); line-height:1.5; }
  .hint code { font-family:var(--mono); color:var(--muted); background:var(--bg); padding:1px 5px; border-radius:5px; }
  .notice { background:var(--warn-soft); color:var(--ink); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; font-size:.82rem; margin-bottom:16px; }
  .notice b { color:var(--warn); }

  @media (max-width:680px) {
    .addrow { grid-template-columns:1fr 1fr; } .addrow .full { grid-column:1 / -1; }
  }
  @media (prefers-reduced-motion:reduce) { * { transition:none !important; } }

  /* ============ insights ============ */
  section.insights { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-top:22px; }
  .ins-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .ins-head h2 { margin:0; font-size:.95rem; font-weight:640; letter-spacing:-.01em; }
  .ins-head h2 span { color:var(--faint); font-family:var(--mono); font-weight:500; margin-left:6px; font-size:.82rem; }
  .ins-pick { display:inline-flex; align-items:center; gap:8px; }
  .ins-pick label { font-size:.64rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); font-weight:600; }
  .ins-pick .swatch { width:9px; height:9px; border-radius:50%; background:var(--pc,var(--p1)); flex:none; }
  .ins-pick select { font-family:var(--sans); font-size:.82rem; font-weight:550; color:var(--ink); background:var(--surface); border:1px solid var(--line-strong); border-radius:8px; padding:7px 9px; max-width:200px; }
  .ins-pick select:focus { outline:none; border-color:var(--p1); box-shadow:0 0 0 3px var(--p1-soft); }

  .ins-body { padding:18px 16px 20px; display:flex; flex-direction:column; gap:22px; }
  .ins-empty { padding:34px 20px; text-align:center; color:var(--muted); font-size:.9rem; }
  .ins-empty .big { font-size:1.5rem; margin-bottom:8px; }
  .ins-empty b { color:var(--ink); }

  .panel h3 { margin:0 0 12px; font-size:.64rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:8px; }
  .panel h3 .hint { text-transform:none; letter-spacing:0; color:var(--faint); font-weight:500; font-family:var(--mono); font-size:.72rem; }
  .ins-cols { display:grid; grid-template-columns:minmax(240px,300px) 1fr; gap:22px; align-items:start; }
  @media (max-width:720px) { .ins-cols { grid-template-columns:1fr; } }

  /* stat tiles */
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(128px,1fr)); gap:10px; }
  .tile { background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 13px; }
  .tile .tk { font-family:var(--mono); font-size:1.5rem; font-weight:600; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums; color:var(--ink); display:flex; align-items:baseline; gap:3px; }
  .tile .tk .u { font-size:.62rem; color:var(--muted); font-weight:500; font-family:var(--mono); letter-spacing:0; }
  .tile .tk.accent { color:var(--pc,var(--p1)); }
  .tile .tl { text-transform:uppercase; letter-spacing:.06em; font-size:.58rem; color:var(--muted); margin-top:9px; font-weight:600; }

  /* contribution heatmap */
  .heat { --cell:13px; --gap:3px; --heat-empty:color-mix(in oklab, var(--ink) 7%, var(--surface)); }
  .heat-scroll { overflow-x:auto; padding-bottom:2px; }
  .heat-plot { display:flex; gap:7px; width:max-content; }
  .heat-wd { display:grid; grid-template-rows:repeat(7,var(--cell)); gap:var(--gap); margin-top:calc(var(--cell) + 5px); }
  .heat-wd span { font-family:var(--mono); font-size:.62rem; color:var(--faint); line-height:var(--cell); height:var(--cell); }
  .heat-cal { display:flex; flex-direction:column; gap:3px; }
  .heat-months { display:grid; grid-auto-flow:column; gap:var(--gap); height:14px; }
  .heat-months span { font-family:var(--mono); font-size:.62rem; color:var(--muted); white-space:nowrap; align-self:end; }
  .heat-cols { display:grid; grid-template-rows:repeat(7,var(--cell)); grid-auto-flow:column; grid-auto-columns:var(--cell); gap:var(--gap); }
  .heat-cell { width:var(--cell); height:var(--cell); border-radius:3px; background:var(--heat-empty); transition:transform .08s; }
  .heat-cell.l1 { background:color-mix(in oklab, var(--pc) 26%, var(--surface)); }
  .heat-cell.l2 { background:color-mix(in oklab, var(--pc) 50%, var(--surface)); }
  .heat-cell.l3 { background:color-mix(in oklab, var(--pc) 74%, var(--surface)); }
  .heat-cell.l4 { background:var(--pc); }
  .heat-cell.void { visibility:hidden; }
  .heat-cell:not(.void):hover, .heat-cell:not(.void):focus-visible { transform:scale(1.32); outline:none; }
  .heat-leg { display:flex; align-items:center; gap:6px; margin-top:12px; font-family:var(--mono); font-size:.68rem; color:var(--muted); }
  .heat-leg .cells { display:inline-flex; gap:3px; }
  .heat-leg i { width:var(--cell); height:var(--cell); border-radius:3px; display:inline-block; }

  /* topic breakdown */
  .topics { display:flex; flex-direction:column; gap:9px; }
  .trow { display:grid; grid-template-columns:1fr; gap:5px; }
  .trow .tmeta { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .trow .tname { font-size:.82rem; color:var(--ink); font-weight:550; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .trow .tnum { font-family:var(--mono); font-size:.74rem; color:var(--muted); font-variant-numeric:tabular-nums; flex:none; }
  .trow .tnum b { color:var(--ink); font-weight:600; }
  .ttrack { height:9px; border-radius:6px; background:var(--line); overflow:hidden; }
  .ttrack i { display:block; height:100%; border-radius:6px; background:var(--pc,var(--p1)); min-width:3px; transition:width .2s; }
  .topics-empty { color:var(--faint); font-size:.82rem; font-style:italic; padding:6px 0; }

  /* race (cumulative over time) */
  .race-top { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .race-wrap { position:relative; }
  .race-svg { width:100%; height:auto; display:block; overflow:visible; touch-action:pan-y; }
  .race-grid line { stroke:var(--line); stroke-width:1; }
  .race-axis text { fill:var(--muted); font-family:var(--mono); font-size:9px; }
  .race-line { fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:opacity .12s; }
  .race-line.sel { stroke-width:3; }
  .race-dot { stroke:var(--surface); stroke-width:2; }
  .race-cross { stroke:var(--line-strong); stroke-width:1; pointer-events:none; }
  .race-hover { pointer-events:none; }
  .race-hit { fill:transparent; }
  .race-legend { display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:12px; }
  .rl-item { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:var(--muted); cursor:pointer; background:none; border:none; padding:0; font-family:var(--sans); }
  .rl-item .rl-key { width:14px; height:2px; border-radius:2px; flex:none; }
  .rl-item.sel { color:var(--ink); font-weight:600; }

  /* shared viz tooltip */
  .viz-tip { position:fixed; z-index:50; pointer-events:none; background:var(--surface); border:1px solid var(--line-strong); border-radius:8px; box-shadow:var(--shadow); padding:8px 10px; font-size:.76rem; color:var(--ink); max-width:220px; opacity:0; transform:translateY(2px); transition:opacity .1s; }
  .viz-tip.show { opacity:1; transform:none; }
  .viz-tip .tt-h { font-family:var(--mono); font-size:.7rem; color:var(--muted); margin-bottom:5px; }
  .viz-tip .tt-r { display:flex; align-items:center; gap:7px; line-height:1.5; }
  .viz-tip .tt-r .k { width:12px; height:2px; border-radius:2px; flex:none; }
  .viz-tip .tt-r .v { font-family:var(--mono); font-variant-numeric:tabular-nums; color:var(--ink); font-weight:600; }
  .viz-tip .tt-r .n { color:var(--muted); }
</style>
</head>
<body>

<!-- ============ GATE ============ -->
<div class="gate" id="gate">
  <div class="gatecard" id="gateCard"></div>
</div>

<!-- ============ APP ============ -->
<div class="wrap" id="app" hidden>
  <header class="top">
    <div class="brand">
      <h1>The Grind</h1>
      <p class="sub">room <b id="roomLabel">—</b> · <span id="crew">0 grinding</span> · synced live</p>
    </div>
    <div class="actions">
      <button id="copyRoom" class="roomchip" title="Copy room code to share"><span class="rdot" id="roomDot"></span><b id="roomCode">room</b> · copy</button>
      <select id="meWho" class="mewho" title="Pick who you are — this controls what you can edit" aria-label="Who are you"></select>
      <button id="syncLc" title="Fetch everyone's LeetCode stats">↻ Sync</button>
      <button id="export">↓ Export</button>
      <button id="adminBtn" title="Admin"></button>
      <button id="clear" class="ghost-danger">Clear solves</button>
      <button id="leave">Leave</button>
    </div>
  </header>

  <div class="board" id="board"></div>

  <div class="addperson">
    <form id="addPlayerForm">
      <input id="playerName" placeholder="Add a teammate to the room…" maxlength="24" autocomplete="off">
      <button class="primary" type="submit">+ Add person</button>
    </form>
  </div>

  <section class="log">
    <div class="log-head">
      <h2>Problem log <span id="count">0</span></h2>
      <div class="seg" id="filter"></div>
    </div>
    <form class="addrow" id="addForm">
      <input class="full" id="f-title" placeholder="Problem name — e.g. Two Sum" required>
      <input id="f-num" placeholder="#" inputmode="numeric" aria-label="Problem number">
      <input id="f-topic" placeholder="Topic — e.g. Hash Map">
      <select id="f-diff" aria-label="Difficulty">
        <option value="e">Easy</option><option value="m" selected>Medium</option><option value="h">Hard</option>
      </select>
      <select id="f-who" aria-label="Who solved it"></select>
      <button type="submit" id="addBtn" class="primary full">+ Log it</button>
    </form>
    <div class="tbl-scroll">
      <table>
        <thead><tr><th>Problem</th><th>Diff</th><th>Who</th><th>Date</th><th style="text-align:right">Pts</th><th></th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" hidden>
      <div class="big">🌱</div>
      <p><b>No problems logged yet.</b></p>
      <p>Add a solve above — it shows up on everyone's screen instantly.</p>
    </div>
  </section>

  <section class="insights" id="insights" hidden>
    <div class="ins-head">
      <h2>Insights <span id="insSub"></span></h2>
      <div class="ins-pick">
        <span class="swatch" id="insSwatch"></span>
        <label for="insWho">Showing</label>
        <select id="insWho" aria-label="Choose whose insights to show"></select>
      </div>
    </div>
    <div class="ins-body" id="insBody"></div>
  </section>

  <div class="foot">
    <div class="rules">Points: <b>Easy 1</b> · <b>Medium 3</b> · <b>Hard 5</b> &nbsp;·&nbsp; 🔥 = current daily streak</div>
    <div id="syncStatus"><span class="sdot"></span>Connecting…</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ============================================================
     CONFIG — paste your Supabase project URL + anon (public) key.
     Supabase → Project Settings → API.
     ============================================================ */
  var CONFIG = {
    url:     "https://orfzttirwywatwvwabqh.supabase.co",
    anonKey: "sb_publishable_kUqiOTca3m60Rg6yCNelcA_twoxwdID"
  };

  var TBL_P = "grind_players", TBL_S = "grind_solves";
  var LC_API = "https://alfa-leetcode-api.onrender.com/"; // CORS-enabled LeetCode stats proxy
  var POINTS = { e: 1, m: 3, h: 5 };
  var DIFF_NAME = { e: "Easy", m: "Medium", h: "Hard" };
  // Distinct hues for the first several people; golden-angle after that.
  var HUES = [245, 190, 330, 24, 160, 270, 210, 90, 300, 45, 130, 15];

  var db = null, room = null;
  var players = [];   // [{id, name}] in creation order
  var solves = [];    // [{id, player_id, title, num, topic, diff, date}]
  var colorIndex = {};// player_id -> stable color slot
  var byId = {};      // player_id -> {name, color}
  var lcById = {};    // player_id -> normalized LeetCode stats (when a player is synced)
  var lcSyncing = {}; // player_id -> true while a LeetCode fetch is in flight
  var lcAttempt = {}; // player_id -> last sync attempt time (throttles auto-retry on failure)
  var roomAdminHash = undefined; // undefined=unknown, null=unclaimed, string=admin passcode hash
  var isAdmin = false;           // whether THIS device has unlocked admin for the room
  var filter = "all";
  var editingId = null;     // id of the log entry currently being edited inline
  var insPid = null;        // participant selected in the Insights section
  var raceMetric = "pts";   // "pts" | "solves" for the cumulative race chart
  var lastRace = null;      // geometry cache for the race chart's hover layer
  var tipEl = null;         // shared floating tooltip element
  var channel = null, refreshTimer = null, boardDirty = false;

  var configOK = CONFIG.url.indexOf("YOUR-PROJECT") === -1 && CONFIG.anonKey.indexOf("YOUR-PUBLIC") === -1;

  // ---- helpers ----
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  function todayISO() { var d = new Date(); return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function fmt(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]; }); }
  function hueFor(i) { return i < HUES.length ? HUES[i] : Math.round((245 + i * 137.508) % 360); }
  function pColor(pid) { return "hsl(" + hueFor(colorIndex[pid] || 0) + " 68% 56%)"; }

  function lcStats(pid) { return lcById[pid] || null; }
  function hasLC(pid) { return !!lcById[pid]; }

  function currentStreak(pid) {
    var set = dayCounts(pid); // LeetCode calendar when synced, else logged solves
    var cur = new Date(todayISO() + "T00:00:00");
    if (!set[fmt(cur)]) { cur.setDate(cur.getDate() - 1); if (!set[fmt(cur)]) return 0; }
    var streak = 0;
    while (set[fmt(cur)]) { streak++; cur.setDate(cur.getDate() - 1); }
    return streak;
  }
  function tally(pid) {
    var lc = lcStats(pid);
    if (lc) return { e: lc.e, m: lc.m, h: lc.h, total: lc.solved, pts: lc.e * POINTS.e + lc.m * POINTS.m + lc.h * POINTS.h };
    var t = { e: 0, m: 0, h: 0, pts: 0, total: 0 };
    solves.forEach(function (s) { if (s.player_id !== pid) return; t[s.diff]++; t.pts += POINTS[s.diff]; t.total++; });
    return t;
  }
  function niceDate(iso) {
    var p = iso.split("-"), d = new Date(+p[0], +p[1] - 1, +p[2]);
    var today = new Date(todayISO() + "T00:00:00"), diff = Math.round((today - d) / 86400000);
    if (diff === 0) return "today";
    if (diff === 1) return "yesterday";
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  // ---- render ----
  function render() { computeAdmin(); rebuildLookups(); renderBoard(); renderCrew(); renderFilter(); renderWho(); renderRows(); renderInsights(); renderRoleUI(); }

  function rebuildLookups() {
    colorIndex = {}; byId = {}; lcById = {};
    players.forEach(function (p, i) { colorIndex[p.id] = i; });
    players.forEach(function (p) { byId[p.id] = { name: p.name, color: pColor(p.id) }; if (p.stats) lcById[p.id] = p.stats; });
  }
  function renderCrew() {
    document.getElementById("crew").textContent = players.length + (players.length === 1 ? " grinding" : " grinding");
  }

  function renderBoard() {
    var board = document.getElementById("board");
    var ae = document.activeElement;
    if (ae && ae.classList && (ae.classList.contains("nameinput") || ae.classList.contains("lcinput"))) { boardDirty = true; return; }
    boardDirty = false;

    if (!players.length) {
      board.innerHTML = '<div class="emptyboard">No one\'s in <b>' + esc(room) + '</b> yet — add people below to start the grind. 👇</div>';
      return;
    }
    var ranked = players.map(function (p) { var t = tally(p.id); return { p: p, t: t, streak: currentStreak(p.id) }; })
      .sort(function (a, b) { return b.t.pts - a.t.pts || b.t.total - a.t.total || a.p.name.localeCompare(b.p.name); });
    var topPts = ranked[0].t.pts;

    board.innerHTML = ranked.map(function (row, i) {
      return cardHTML(row.p, row.t, row.streak, i + 1, topPts > 0 && row.t.pts === topPts);
    }).join("");

    Array.prototype.forEach.call(board.querySelectorAll(".nameinput"), function (inp) {
      inp.addEventListener("change", function () {
        var id = inp.dataset.id, name = inp.value.trim();
        if (!name) { inp.value = (byId[id] && byId[id].name) || ""; return; }
        renamePlayer(id, name);
      });
      inp.addEventListener("keydown", function (e) { if (e.key === "Enter") inp.blur(); });
      inp.addEventListener("blur", function () { if (boardDirty) renderBoard(); });
    });
    Array.prototype.forEach.call(board.querySelectorAll(".removep"), function (b) {
      b.addEventListener("click", function () { removePlayer(b.dataset.id); });
    });
    Array.prototype.forEach.call(board.querySelectorAll(".lcinput"), function (inp) {
      inp.addEventListener("change", function () { setLeetcode(inp.dataset.id, inp.value.trim()); });
      inp.addEventListener("keydown", function (e) { if (e.key === "Enter") inp.blur(); });
      inp.addEventListener("blur", function () { if (boardDirty) renderBoard(); });
    });
  }

  function cardHTML(p, t, streak, rank, leading) {
    var color = pColor(p.id), mine = isAdmin || isMe(p.id);
    var seg = t.total ? pctBar("e", t.e, t.total) + pctBar("m", t.m, t.total) + pctBar("h", t.h, t.total) : "";
    return '<div class="pcard' + (leading ? " leading" : "") + '" style="--pc:' + color + '">' +
        (isAdmin ? '<button class="removep" data-id="' + p.id + '" title="Remove from room" aria-label="Remove ' + esc(p.name) + '">✕</button>' : '') +
        '<div class="pname"><span class="rk">' + rank + '</span><span class="dot"></span>' +
          '<input class="nameinput" data-id="' + p.id + '" value="' + esc(p.name) + '" aria-label="Name" maxlength="24"' + (mine ? '' : ' readonly') + '>' +
          (leading ? '<span class="crown" title="In the lead">👑</span>' : '') + '</div>' +
        '<div class="statrow">' +
          '<div class="stat"><div class="k">' + t.pts + '<span class="u">pts</span></div><div class="l">Score</div></div>' +
          '<div class="stat"><div class="k">' + t.total + '</div><div class="l">Solved</div></div>' +
          '<div class="stat"><div class="k streak' + (streak > 0 ? " hot" : "") + '">' + (streak > 0 ? "🔥" : "") + streak + '</div><div class="l">Streak</div></div>' +
        '</div>' +
        '<div class="breakdown"><div class="bar">' + seg + '</div><div class="blabels">' +
          lbl("e", "Easy", t.e) + lbl("m", "Med", t.m) + lbl("h", "Hard", t.h) + '</div></div>' +
        '<div class="lcrow"><input class="lcinput" data-id="' + p.id + '" value="' + esc(p.lc || "") + '" placeholder="＋ LeetCode username" maxlength="40" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="LeetCode username for ' + esc(p.name) + '"' + (mine ? '' : ' readonly') + '>' + lcBadge(p) + '</div>' +
      '</div>';
  }
  function lcBadge(p) {
    if (p.stats) return '<span class="lcstat ok" title="Score, streak and heatmap are synced from LeetCode">🔗 synced</span>';
    if (p.lc) return '<span class="lcstat pend" title="Press Sync to fetch">· pending</span>';
    return '';
  }
  function pctBar(cls, n, total) { var w = (n / total) * 100; return w > 0 ? '<i class="' + cls + '" style="width:' + w + '%"></i>' : ""; }
  function lbl(cls, name, n) {
    var c = cls === "e" ? "var(--easy)" : cls === "m" ? "var(--medium)" : "var(--hard)";
    return '<span><span class="sw" style="background:' + c + '"></span>' + name + ' <b>' + n + '</b></span>';
  }

  function renderFilter() {
    var el = document.getElementById("filter");
    var html = '<button data-f="all" class="' + (filter === "all" ? "on" : "") + '">All</button>';
    players.forEach(function (p) {
      html += '<button data-f="' + p.id + '" class="' + (String(filter) === String(p.id) ? "on" : "") + '">' +
        '<span class="pdot" style="background:' + pColor(p.id) + '"></span>' + esc(p.name) + '</button>';
    });
    el.innerHTML = html;
  }

  function renderWho() {
    var sel = document.getElementById("f-who"), btn = document.getElementById("addBtn");
    if (!players.length) {
      sel.innerHTML = '<option value="">— add people first —</option>';
      sel.disabled = true; btn.disabled = true; return;
    }
    sel.disabled = false; btn.disabled = false;
    var prev = sel.value, saved = "";
    try { saved = localStorage.getItem("grind.me." + room) || ""; } catch (e) {}
    var exists = function (v) { return v && players.some(function (p) { return String(p.id) === String(v); }); };
    var me = meId();
    if (!isAdmin && exists(me)) { // users can only log as themselves
      sel.innerHTML = players.filter(function (p) { return String(p.id) === String(me); }).map(function (p) { return '<option value="' + p.id + '">' + esc(p.name) + '</option>'; }).join("");
      sel.value = String(me);
    } else {
      sel.innerHTML = players.map(function (p) { return '<option value="' + p.id + '">' + esc(p.name) + '</option>'; }).join("");
      sel.value = exists(prev) ? prev : (exists(saved) ? saved : String(players[0].id));
    }
  }

  function renderRows() {
    var tbody = document.getElementById("rows");
    if (editingId != null && !solves.some(function (s) { return String(s.id) === String(editingId); })) editingId = null;
    var ae = document.activeElement;
    if (editingId != null && ae && ae.closest && ae.closest('tr[data-edit="1"]')) return; // keep an open editor from being clobbered by a background refresh
    var list = solves.slice().sort(function (a, b) { return a.date < b.date ? 1 : a.date > b.date ? -1 : b.id - a.id; });
    if (filter !== "all") list = list.filter(function (s) { return String(s.player_id) === String(filter); });
    document.getElementById("count").textContent = solves.length;
    var empty = document.getElementById("empty");

    if (!list.length) {
      tbody.innerHTML = "";
      empty.hidden = solves.length !== 0;
      if (solves.length && filter !== "all") {
        var nm = byId[filter] ? byId[filter].name : "them";
        tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:32px">No solves logged for ' + esc(nm) + ' yet.</td></tr>';
        empty.hidden = true;
      }
      return;
    }
    empty.hidden = true;
    tbody.innerHTML = list.map(function (s) {
      if (String(s.id) === String(editingId)) return editRowHTML(s);
      var who = byId[s.player_id] || { name: "—", color: "var(--faint)" };
      var canRow = isAdmin || isMe(s.player_id);
      var num = s.num ? '<span class="ptopic"> #' + esc(s.num) + '</span>' : "";
      var topic = s.topic ? '<div class="ptopic">' + esc(s.topic) + '</div>' : "";
      return '<tr>' +
        '<td><span class="ptitle">' + esc(s.title) + '</span>' + num + topic + '</td>' +
        '<td><span class="pill ' + s.diff + '">' + DIFF_NAME[s.diff] + '</span></td>' +
        '<td><span class="who"><span class="d" style="background:' + who.color + '"></span>' + esc(who.name) + '</span></td>' +
        '<td class="date">' + niceDate(s.date) + '</td>' +
        '<td class="pts">+' + POINTS[s.diff] + '</td>' +
        '<td style="text-align:right">' + (canRow ? '<button class="edit" data-id="' + s.id + '" title="Edit" aria-label="Edit">✎</button><button class="del" data-id="' + s.id + '" title="Delete" aria-label="Delete">✕</button>' : '') + '</td></tr>';
    }).join("");
    Array.prototype.forEach.call(tbody.querySelectorAll(".del"), function (b) {
      b.addEventListener("click", function () { deleteSolve(b.dataset.id); });
    });
    Array.prototype.forEach.call(tbody.querySelectorAll(".edit"), function (b) {
      b.addEventListener("click", function () { editingId = b.dataset.id; render(); });
    });
    var ef = tbody.querySelector("form.editrow");
    if (ef) {
      ef.addEventListener("submit", function (e) {
        e.preventDefault();
        var t = ef.querySelector(".e-title").value.trim();
        if (!t) { ef.querySelector(".e-title").focus(); return; }
        updateSolve(ef.dataset.id, {
          player_id: +ef.querySelector(".e-who").value,
          title: t,
          num: ef.querySelector(".e-num").value.trim(),
          topic: ef.querySelector(".e-topic").value.trim(),
          diff: ef.querySelector(".e-diff").value,
          date: ef.querySelector(".e-date").value || todayISO()
        });
      });
      ef.querySelector(".ecancel").addEventListener("click", function () { editingId = null; render(); });
      var ti = ef.querySelector(".e-title"); if (ti) { ti.focus(); ti.setSelectionRange(ti.value.length, ti.value.length); }
    }
  }

  function editRowHTML(s) {
    var whoOpts = players.map(function (p) { return '<option value="' + p.id + '"' + (String(p.id) === String(s.player_id) ? " selected" : "") + '>' + esc(p.name) + '</option>'; }).join("");
    var dOpt = function (v, l) { return '<option value="' + v + '"' + (s.diff === v ? " selected" : "") + '>' + l + '</option>'; };
    return '<tr data-edit="1"><td class="editcell" colspan="6">' +
      '<form class="addrow editrow" data-id="' + s.id + '">' +
        '<input class="full e-title" value="' + esc(s.title) + '" placeholder="Problem name" maxlength="120" required>' +
        '<input class="e-num" value="' + esc(s.num || "") + '" placeholder="#" inputmode="numeric" aria-label="Problem number">' +
        '<input class="e-topic" value="' + esc(s.topic || "") + '" placeholder="Topic" aria-label="Topic">' +
        '<select class="e-diff" aria-label="Difficulty">' + dOpt("e", "Easy") + dOpt("m", "Medium") + dOpt("h", "Hard") + '</select>' +
        '<select class="e-who" aria-label="Who solved it">' + whoOpts + '</select>' +
        '<input type="date" class="e-date" value="' + esc(s.date) + '" max="' + todayISO() + '" aria-label="Date solved">' +
        '<div class="ebtns"><button type="button" class="ecancel">Cancel</button><button type="submit" class="primary esave">Save</button></div>' +
      '</form></td></tr>';
  }
  function updateSolve(id, p) {
    solves = solves.map(function (s) {
      return String(s.id) === String(id) ? { id: s.id, player_id: p.player_id, title: p.title, num: p.num, topic: p.topic, diff: p.diff, date: p.date } : s;
    });
    editingId = null; render();
    db.from(TBL_S).update({ player_id: p.player_id, title: p.title, num: p.num, topic: p.topic, diff: p.diff, solved_on: p.date })
      .eq("room", room).eq("id", id)
      .then(function (r) { if (r.error) { console.error(r.error); alert("Couldn't save changes — check your connection."); } scheduleRefresh(); });
  }

  // ---- insights: data helpers ----
  var WD_SHORT = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  var MON_SHORT = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  function solvesFor(pid) { return solves.filter(function (s) { return String(s.player_id) === String(pid); }); }
  function dayCounts(pid) {

  function raceSeries(metric) {

    var incOf = function (pid) {

      if (metric === "pts" && !lc) { var m = {}; solvesFor(pid).forEach(function (s) { m[s.date] = (m[s.date] || 0) + POINTS[s.diff]; }); return m; }
      return dayCounts(pid);

  }

  function panelHeatmap() {
    var dc = dayCounts(insPid), days = Object.keys(dc).sort();
    var firstISO = days[0] || todayISO(), today = new Date(todayISO() + "T00:00:00");
    var end = new Date(today); end.setDate(end.getDate() + (6 - end.getDay())); // Saturday of this week
    var weeksSince = Math.ceil((end - new Date(firstISO + "T00:00:00")) / (86400000 * 7)) + 1;
    var weeks = Math.max(13, Math.min(26, weeksSince));
    var start = new Date(end); start.setDate(start.getDate() - (weeks * 7 - 1)); // a Sunday

    var cells = "", months = "", lastLbl = -99, prevM = -1;
    for (var w = 0; w < weeks; w++) {
      var col = new Date(start); col.setDate(start.getDate() + w * 7);
      var m = col.getMonth();
      if (m !== prevM && (w - lastLbl) >= 3) { months += '<span style="grid-column:' + (w + 1) + '">' + MON_SHORT[m] + '</span>'; lastLbl = w; }
      prevM = m;

  function panelTopics() {

  function raceSVG(data) {
    var W = 720, H = 260, PL = 34, PR = 14, PT = 14, PB = 24;
    var plotW = W - PL - PR, plotH = H - PT - PB, n = data.dates.length, max = data.max || 1;
    var xs = []; for (var i = 0; i < n; i++) xs.push(PL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW));
    var Y = function (v) { return PT + plotH - (v / max) * plotH; };
    var step = niceStep(max), grid = "", ylab = "";
    for (var tk = 0; tk <= max + 0.001; tk += step) {
      var gy = Y(tk).toFixed(1);
      grid += '<line x1="' + PL + '" y1="' + gy + '" x2="' + (W - PR) + '" y2="' + gy + '"/>';
      ylab += '<text x="' + (PL - 6) + '" y="' + (Y(tk) + 3).toFixed(1) + '" text-anchor="end">' + tk + '</text>';
    }
    var xlab = "", xc = Math.min(5, n);

      var path = se.pts.map(function (v, i) { return (i ? "L" : "M") + xs[i].toFixed(1) + " " + Y(v).toFixed(1); }).join(" ");
      lines += '<path class="race-line' + (sel ? " sel" : "") + '" style="stroke:' + se.color + '" d="' + path + '"/>';
      var lv = se.pts[n - 1], ly = Y(lv);
      dots += '<circle class="race-dot" cx="' + xs[n - 1].toFixed(1) + '" cy="' + ly.toFixed(1) + '" r="' + (sel ? 4.5 : 3.5) + '" style="fill:' + se.color + '"/>';
      if (sel) dots += '<text x="' + (xs[n - 1] - 7).toFixed(1) + '" y="' + (ly - 7).toFixed(1) + '" text-anchor="end" style="fill:var(--ink);font-weight:700;font-family:var(--mono);font-size:10px">' + lv + '</text>';
      coords.push(se.pts.map(function (v, i) { return { x: xs[i], y: Y(v), v: v }; }));
    });
    lastRace = { n: n, xs: xs, W: W, PT: PT, PB: PB, H: H, dates: data.dates, series: data.series, coords: coords };
    return '<svg class="race-svg" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Cumulative ' + (raceMetric === "pts" ? "points" : "solves") + ' over time by participant">' +

    function nearest(clientX) { var r = svg.getBoundingClientRect(), scale = r.width / L.W, vx = (clientX - r.left) / scale, idx = 0, best = 1e9; for (var i = 0; i < L.n; i++) { var dd = Math.abs(L.xs[i] - vx); if (dd < best) { best = dd; idx = i; } } return idx; }

  // ---- data access ----
  function mapSolve(r) { return { id: r.id, player_id: r.player_id, title: r.title, num: r.num, topic: r.topic, diff: r.diff, date: r.solved_on }; }
  function scheduleRefresh() { clearTimeout(refreshTimer); refreshTimer = setTimeout(refresh, 150); }

  function refresh() {
    if (!db || !room) return;
    Promise.all([
      db.from(TBL_P).select("*").eq("room", room).order("id", { ascending: true }),
      db.from(TBL_S).select("*").eq("room", room)
    ]).then(function (res) {
      if (res[0].error) throw res[0].error;
      if (res[1].error) throw res[1].error;
      players = (res[0].data || []).map(function (r) { return { id: r.id, name: r.name, lc: r.leetcode_username || "", stats: r.lc_stats || null, syncedAt: r.lc_synced_at || null }; });
      solves = (res[1].data || []).map(mapSolve);
      render();
      maybeAutoSync();
      if (channel && channel.state === "joined") setSync("live", "Live · changes sync to everyone");
    }).catch(function (err) {
      console.error(err);
      setSync("off", "Offline — retrying…");
      clearTimeout(refreshTimer); refreshTimer = setTimeout(refresh, 3000);
    });
  }

  function subscribe() {
    if (channel) db.removeChannel(channel);
    channel = db.channel("room-" + room)
      .on("postgres_changes", { event: "*", schema: "public", table: TBL_S, filter: "room=eq." + room }, scheduleRefresh)
      .on("postgres_changes", { event: "*", schema: "public", table: TBL_P, filter: "room=eq." + room }, scheduleRefresh)
      .subscribe(function (status) {
        if (status === "SUBSCRIBED") setSync("live", "Live · changes sync to everyone");
        else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") setSync("off", "Reconnecting…");
        else setSync("warn", "Connecting…");
      });
  }

  function addSolve(rec) {
    db.from(TBL_S).insert({ room: room, player_id: rec.player_id, title: rec.title, num: rec.num, topic: rec.topic, diff: rec.diff, solved_on: todayISO() })
      .then(function (r) { if (r.error) { console.error(r.error); alert("Couldn't save that solve — check your connection."); } else scheduleRefresh(); });
  }
  function deleteSolve(id) {

  }

  function removePlayer(id) {
    var who = byId[id] ? byId[id].name : "this person";
    if (!confirm("Remove " + who + " and all their solves from room “" + room + "”? This can't be undone.")) return;
    players = players.filter(function (p) { return String(p.id) !== String(id); });
    solves = solves.filter(function (s) { return String(s.player_id) !== String(id); }); render();
    db.from(TBL_S).delete().eq("room", room).eq("player_id", id).then(function () {
      db.from(TBL_P).delete().eq("room", room).eq("id", id).then(scheduleRefresh);
    });
  }
  function clearSolves() {
    if (!solves.length) return;
    if (!confirm("Clear ALL solves for room “" + room + "”? Keeps the people, wipes their solves. Can't be undone (Export first to keep a copy).")) return;
    db.from(TBL_S).delete().eq("room", room).then(function (r) { if (r.error) { console.error(r.error); alert("Couldn't clear — check your connection."); } else scheduleRefresh(); });
  }

  // ---- leetcode sync ----
  function setLeetcode(id, uname) {
    players = players.map(function (p) { return String(p.id) === String(id) ? { id: p.id, name: p.name, lc: uname, stats: uname ? p.stats : null, syncedAt: p.syncedAt } : p; });
    render();
    var patch = uname ? { leetcode_username: uname } : { leetcode_username: null, lc_stats: null, lc_synced_at: null };
    db.from(TBL_P).update(patch).eq("room", room).eq("id", id).then(function (r) {
      if (r.error) { console.error(r.error); alert("Couldn't save the LeetCode username — is the column added? (see SETUP)"); }
      if (uname) syncOne(id, uname); else scheduleRefresh();
    });
  }
  function normalizeCal(raw) {
    var cal = {};
    try {
      var obj = JSON.parse(raw || "{}");
      Object.keys(obj).forEach(function (k) {
        var d = new Date((+k) * 1000);
        var iso = d.getUTCFullYear() + "-" + pad(d.getUTCMonth() + 1) + "-" + pad(d.getUTCDate());
        cal[iso] = (cal[iso] || 0) + (+obj[k] || 0);
      });
    } catch (e) {}
    return cal;
  }
  function syncOne(id, uname) {
    if (!uname || lcSyncing[id]) return Promise.resolve();
    lcSyncing[id] = true; lcAttempt[id] = Date.now();
    var u = encodeURIComponent(uname);
    return Promise.all([
      fetch(LC_API + u + "/solved").then(function (r) { return r.json(); }),
      fetch(LC_API + u + "/calendar").then(function (r) { return r.json(); })
    ]).then(function (res) {
      var s = res[0] || {}, c = res[1] || {};
      if (s.errors || (s.solvedProblem == null && s.easySolved == null)) throw new Error("no LeetCode data for " + uname);
      var stats = { solved: s.solvedProblem || 0, e: s.easySolved || 0, m: s.mediumSolved || 0, h: s.hardSolved || 0, cal: normalizeCal(c.submissionCalendar) };
      return db.from(TBL_P).update({ lc_stats: stats, lc_synced_at: new Date().toISOString() }).eq("room", room).eq("id", id)
        .then(function (r) { if (r.error) console.error(r.error); });
    }).catch(function (err) { console.error("LeetCode sync failed:", err && err.message); })
      .then(function () { lcSyncing[id] = false; scheduleRefresh(); });
  }
  function syncLeetcode() {
    var linked = players.filter(function (p) { return p.lc; });
    var btn = document.getElementById("syncLc");
    if (!linked.length) { alert("Add a LeetCode username on someone's card first — the field under their name."); return; }
    if (btn) { btn.disabled = true; btn.textContent = "↻ Syncing…"; }
    var i = 0;
    (function next() {
      if (i >= linked.length) { if (btn) { btn.disabled = false; btn.textContent = "↻ Sync"; } scheduleRefresh(); return; }
      var p = linked[i++];
      syncOne(p.id, p.lc).then(next);
    })();
  }
  function maybeAutoSync() {
    var now = Date.now(), STALE = 30 * 60 * 1000;
    players.forEach(function (p) {
      if (!p.lc || lcSyncing[p.id]) return;
      if (lcAttempt[p.id] && now - lcAttempt[p.id] < STALE) return;
      var t = p.syncedAt ? Date.parse(p.syncedAt) : 0;
      if (now - t > STALE) syncOne(p.id, p.lc);
    });
  }

  // ---- soft roles (honor-system admin) ----
  function meId() { try { return localStorage.getItem("grind.me." + room) || ""; } catch (e) { return ""; } }
  function isMe(pid) { var m = meId(); return m !== "" && String(pid) === String(m); }
  function computeAdmin() {
    if (roomAdminHash === undefined || roomAdminHash === null) { isAdmin = true; return; } // unknown or unclaimed → full access (legacy)
    var local = ""; try { local = localStorage.getItem("grind.admin." + room) || ""; } catch (e) {}
    isAdmin = !!local && local === roomAdminHash;
  }
  function sha256Hex(str) {
    if (window.crypto && crypto.subtle && window.TextEncoder) {
      return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)).then(function (buf) {
        return Array.prototype.map.call(new Uint8Array(buf), function (b) { return ("0" + b.toString(16)).slice(-2); }).join("");
      });
    }
    return Promise.resolve("plain:" + str); // fallback where SubtleCrypto is unavailable (e.g. file://)
  }
  function fetchRoomMeta() {
    if (!db || !room) return;
    db.from("grind_rooms").select("admin_hash").eq("room", room).maybeSingle().then(function (r) {
      roomAdminHash = (r.error || !r.data) ? null : (r.data.admin_hash || null);
      render();
    }, function () { roomAdminHash = null; render(); });
  }
  function claimAdmin() {
    var code = prompt("Set an admin passcode for room “" + room + "”.\nYou'll use it to unlock admin controls; teammates won't have it.");
    if (!code) return;
    sha256Hex(code).then(function (h) {
      db.from("grind_rooms").upsert({ room: room, admin_hash: h }).then(function (r) {
        if (r.error) { console.error(r.error); alert("Couldn't set admin — re-run schema.sql to add the room-roles table (see SETUP)."); return; }
        try { localStorage.setItem("grind.admin." + room, h); } catch (e) {}
        roomAdminHash = h; render();
      });
    });
  }
  function unlockAdmin() {
    var code = prompt("Enter the admin passcode for “" + room + "”:");
    if (!code) return;
    sha256Hex(code).then(function (h) {
      if (h === roomAdminHash) { try { localStorage.setItem("grind.admin." + room, h); } catch (e) {} render(); }
      else alert("That passcode doesn't match.");
    });
  }
  function stepDownAdmin() { try { localStorage.removeItem("grind.admin." + room); } catch (e) {} render(); }
  function onAdminBtn() { if (roomAdminHash == null) claimAdmin(); else if (isAdmin) stepDownAdmin(); else unlockAdmin(); }
  function renderRoleUI() {
    var btn = document.getElementById("adminBtn");
    if (btn) {
      if (roomAdminHash == null) { btn.textContent = "Set admin"; btn.title = "Claim admin for this room with a passcode"; btn.className = ""; }
      else if (isAdmin) { btn.textContent = "🔓 Admin"; btn.title = "You're the admin — click to step down on this device"; btn.className = "adminon"; }
      else { btn.textContent = "🔒 Admin"; btn.title = "Enter the passcode to unlock admin controls"; btn.className = ""; }
    }
    var clr = document.getElementById("clear"); if (clr) clr.hidden = !isAdmin;
    var mw = document.getElementById("meWho");
    if (mw) {
      mw.innerHTML = players.length
        ? '<option value="">who are you?</option>' + players.map(function (p) { return '<option value="' + p.id + '">' + esc(p.name) + '</option>'; }).join("")
        : '<option value="">—</option>';
      mw.value = meId();
    }
  }

  // ---- room join / leave ----
  function normalizeCode(s) { return String(s || "").trim().toLowerCase().replace(/[^a-z0-9-]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "").slice(0, 40); }

  function enterRoom(code) {
    room = normalizeCode(code);
    if (!room) return;
    roomAdminHash = undefined; isAdmin = false;
    try { localStorage.setItem("grind.room", room); } catch (e) {}
    document.getElementById("gate").hidden = true;
    document.getElementById("app").hidden = false;
    document.getElementById("roomLabel").textContent = room;
    document.getElementById("roomCode").textContent = room;
    setSync("warn", "Connecting…");
    subscribe();
    refresh();
    fetchRoomMeta();
  }
  function leaveRoom() {
    try { localStorage.removeItem("grind.room"); } catch (e) {}
    if (channel) { db.removeChannel(channel); channel = null; }
    room = null; players = []; solves = []; filter = "all"; editingId = null; insPid = null;
    lcById = {}; lcSyncing = {}; lcAttempt = {}; roomAdminHash = undefined; isAdmin = false; hideTip();
    document.getElementById("app").hidden = true;
    document.getElementById("gate").hidden = false;
    showGate();
  }

  // ---- gate ----
  function showGate() {
    var card = document.getElementById("gateCard");
    if (!configOK) {
      card.innerHTML = '<h1>Almost there</h1><p class="lead">One-time setup to connect everyone.</p>' +
        '<div class="notice"><b>Add your Supabase keys.</b> Open <code>index.html</code>, find the <code>CONFIG</code> block near the top of the script, and paste your Project URL + anon key.</div>' +
        '<p class="hint">Full walkthrough is in <code>SETUP.md</code> next to this file. ~2 minutes.</p>';
      return;
    }
    var saved = "";
    try { saved = localStorage.getItem("grind.room") || ""; } catch (e) {}
    card.innerHTML = '<h1>The Grind</h1><p class="lead">Enter a room code your group shares. Same code = same board.</p>' +
      '<form id="joinForm"><label class="field"><span>Room code</span>' +
      '<input id="roomInput" placeholder="e.g. squad-grind" autocomplete="off" autocapitalize="off" spellcheck="false" value="' + esc(saved) + '"></label>' +
      '<button class="go primary" type="submit">Enter the grind →</button></form>' +
      '<p class="hint">Make up any code and share it with the group. Anyone with the code can see this board, so pick something only your crew would guess.</p>';
    document.getElementById("joinForm").addEventListener("submit", function (e) { e.preventDefault(); enterRoom(document.getElementById("roomInput").value); });
    document.getElementById("roomInput").focus();
  }

  // ---- static wiring ----
  document.getElementById("addForm").addEventListener("submit", function (e) {
    e.preventDefault();
    if (!players.length) return;
    var title = document.getElementById("f-title").value.trim();
    if (!title) return;
    addSolve({
      player_id: +document.getElementById("f-who").value,
      title: title,
      num: document.getElementById("f-num").value.trim(),
      topic: document.getElementById("f-topic").value.trim(),
      diff: document.getElementById("f-diff").value
    });
    this.reset();
    document.getElementById("f-diff").value = "m";
    renderWho();
    document.getElementById("f-title").focus();
  });
  document.getElementById("addPlayerForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var name = document.getElementById("playerName").value.trim();
    if (name) addPlayer(name);
  });
  document.getElementById("f-who").addEventListener("change", function () {
    try { localStorage.setItem("grind.me." + room, this.value); } catch (e) {}
  });
  document.getElementById("insWho").addEventListener("change", function () {
    insPid = this.value;
    try { localStorage.setItem("grind.ins." + room, insPid); } catch (e) {}
    renderInsights();
  });
  document.getElementById("filter").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    filter = b.dataset.f; renderFilter(); renderRows();
  });
  document.getElementById("copyRoom").addEventListener("click", function () {
    var codeEl = document.getElementById("roomCode");
    var done = function () { codeEl.textContent = "copied!"; setTimeout(function () { codeEl.textContent = room; }, 1200); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(room).then(done, function () { alert("Room code: " + room); });
    else alert("Room code: " + room);
  });
  document.getElementById("export").addEventListener("click", function () {
    var data = JSON.stringify({ room: room, players: players, solves: solves }, null, 2);
    var blob = new Blob([data], { type: "application/json" }), a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "grind-" + room + "-" + todayISO() + ".json"; a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  });
  document.getElementById("syncLc").addEventListener("click", syncLeetcode);
  document.getElementById("adminBtn").addEventListener("click", onAdminBtn);
  document.getElementById("meWho").addEventListener("change", function () { try { localStorage.setItem("grind.me." + room, this.value); } catch (e) {} render(); });
  document.getElementById("clear").addEventListener("click", clearSolves);
  document.getElementById("leave").addEventListener("click", leaveRoom);

  // ---- boot ----
  function boot() {
    if (configOK) {
      db = window.supabase.createClient(CONFIG.url, CONFIG.anonKey);
      var saved = "";
      try { saved = localStorage.getItem("grind.room") || ""; } catch (e) {}
      if (saved) { enterRoom(saved); return; }
    }
    showGate();
  }
  boot();
})();
</script>
</body>
</html>
